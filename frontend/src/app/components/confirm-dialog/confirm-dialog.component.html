<div class="dialog-container">
	<!-- Close Button X -->
	<button class="close-btn" (click)="onCancel()" aria-label="Close dialog">
		<mat-icon>close</mat-icon>
	</button>

	<!-- Decorative Icon -->
	<div class="icon-wrapper" *ngIf="data.icon" [class]="'icon-primary'">
		<mat-icon class="dialog-icon">{{ data.icon }}</mat-icon>
	</div>

	<!-- Main Content -->
	<div class="content">
		<h2 class="dialog-title">{{ data.title }}</h2>
		<p class="dialog-message">{{ data.message }}</p>
		<p class="detail-display" *ngIf="data.detail">
			{{ data.detail }}
		</p>
	</div>

	<!-- Buttons -->
	<div class="dialog-actions">
		<div class="action-group">
			<!-- Secondary Action (Danger - Delete) -->
			<button *ngIf="data.showSecondaryAction" class="btn"
				[ngClass]="'btn-' + (data.secondaryActionColor || 'danger')" (click)="onSecondaryAction()">
				{{ data.secondaryActionText || 'Delete' }}
			</button>

			<!-- Primary Action (Confirm - Primary) -->
			<button class="btn" [ngClass]="'btn-' + (data.color || 'primary')" (click)="onConfirm()">
				{{ data.confirmText || 'Confirm' }}
			</button>
		</div>
	</div>
</div>
