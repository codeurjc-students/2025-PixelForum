<div class="dialog-container">
    <h2 mat-dialog-title>{{ data.title }}</h2>

    <mat-dialog-content>
        <p>{{ data.message }}</p>
        <p class="detail-display" *ngIf="data.detail">
            <strong>{{ data.detail }}</strong>
        </p>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="onCancel()" [disabled]="isLoading">
            {{ data.cancelText || 'Cancel' }}
        </button>
        <button mat-raised-button [color]="data.color || 'warn'" (click)="onConfirm()" [disabled]="isLoading" id="confirm-button">
            <mat-spinner *ngIf="isLoading" diameter="20" class="spinner-inline"></mat-spinner>
            {{ isLoading ? 'Please wait...' : (data.confirmText || 'Confirm') }}
        </button>
    </mat-dialog-actions>
</div>
