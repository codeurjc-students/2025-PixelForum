<div class="post-card" [class.detail-mode]="mode === 'detail'" (click)="onPostClick()">
	<!-- Header: Author, Topic -->
	<div class="post-header">
		<!-- Back button (only in detail mode) -->
		<button *ngIf="mode === 'detail'" class="back-btn-header" (click)="goBack()" title="Go back">
			←
		</button>
		<div class="author-info" (click)="goToUser(); $event.stopPropagation()">
			<div class="avatar">
				<svg class="btn-icon avatar" viewBox="0 0 24 24">
					<path d="M18 20a6 6 0 0 0-12 0" />
					<circle cx="12" cy="10" r="4" />
					<circle cx="12" cy="12" r="10" />
				</svg>
			</div>
			<div class="author-meta">
				<span class="username">{{ post.author?.username }}</span>
				<span class="timestamp">{{ post.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
			</div>
		</div>
		<button *ngIf="post.topic" class="topic-tag" (click)="goToTopic(); $event.stopPropagation()">
			{{ post.topic.name }}
		</button>
	</div>

	<!-- Title -->
	<div class="post-title-section">
		<h2 class="post-title" id="post-title">{{ post.title }}</h2>
	</div>

	<!-- Images -->
	<div *ngIf="imageCount > 0" class="post-images-section">
		<div class="image-container">
			<img [src]="currentImage" alt="Post image" class="main-image" />

			<!-- Navigation Arrows -->
			<button *ngIf="imageCount > 1" class="carousel-btn carousel-btn-prev"
				(click)="prevImage(); $event.stopPropagation()" title="Previous">
				‹
			</button>
			<button *ngIf="imageCount > 1" class="carousel-btn carousel-btn-next"
				(click)="nextImage(); $event.stopPropagation()" title="Next">
				›
			</button>

			<!-- Image Counter -->
			<div *ngIf="imageCount > 1" class="image-counter">
				{{ currentImageIndex + 1 }}/{{ imageCount }}
			</div>
		</div>
	</div>

	<!-- Text Content (only in detail mode or when no images) -->
	<div *ngIf="mode === 'detail' || imageCount === 0" class="post-text-section">
		<p class="post-content">{{ post.content }}</p>
	</div>

	<!-- Interactions Footer -->
	<div class="post-footer">
		<button class="interaction-btn like-btn" (click)="toggleLike(); $event.stopPropagation()" title="Like">
			<svg viewBox="0 0 24 24" class="icon">
				<path
					d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z" />
				<path d="M7 10v12" />
			</svg>
			<span class="count">{{ post.likes || 0 }}</span>
		</button>
		<button class="interaction-btn comment-btn" (click)="goToComments(); $event.stopPropagation()" title="Comments">
			<svg viewBox="0 0 24 24" class="icon">
				<path
					d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719" />
			</svg>
			<span class="count">0</span>
		</button>
		<div class="right-buttons">
			<button *ngIf="isOwner$ | async" class="interaction-btn edit-btn"
				(click)="editPost(); $event.stopPropagation()" title="Edit">
				<svg viewBox="0 0 24 24" class="icon">
					<path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
					<path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/>
				</svg>
				Edit
			</button>
			<button *ngIf="isOwner$ | async" class="interaction-btn delete-btn"
				(click)="openDeleteDialog(); $event.stopPropagation()" title="Delete">
				<svg viewBox="0 0 24 24" class="icon">
					<path d="M10 11v6"/>
					<path d="M14 11v6"/>
					<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
					<path d="M3 6h18"/>
					<path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
				</svg>
				Delete
			</button>
		</div>
	</div>
</div>
