<div class="profile-container">
	<!-- Back button -->
	<div class="profile-header">
		<div class="profile-cover">
			<button class="back-btn-cover" (click)="goBack()" aria-label="Back">
				<svg viewBox="0 0 24 24" class="back-icon">
					<path d="m12 19-7-7 7-7" />
					<path d="M19 12H5" />
				</svg>
			</button>
		</div>

		<!-- Loading State -->
		<div class="state-container" *ngIf="isLoadingUser">
			<div class="loading-spinner">
				<div class="spinner"></div>
				<p>Loading state...</p>
			</div>
		</div>

		<!-- Profile Wrapper -->
		<div class="profile-wrapper" *ngIf="!isLoadingUser && user">
			<div class="profile-info">
				<!-- Profile Picture -->
				<div class="profile-picture">
					<img [src]="avatarUrl" [alt]="user.username" *ngIf="user.avatar" />
					<svg class="btn-icon avatar" viewBox="0 0 24 24" *ngIf="!user.avatar">
						<path d="M18 20a6 6 0 0 0-12 0" />
						<circle cx="12" cy="10" r="4" />
						<circle cx="12" cy="12" r="10" />
					</svg>
					<input type="file" id="avatarFileInput" accept="image/png, image/jpeg"
						(change)="onImageSelected($event)" hidden />
					<div class="edit-overlay" *ngIf="isOwnProfile" (click)="onAvatarEditClick()">
						<svg viewBox="0 0 24 24">
							<path d="M16 5h6" />
							<path d="M19 2v6" />
							<path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5" />
							<path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
							<circle cx="9" cy="9" r="2" />
						</svg>
					</div>
				</div>

				<!-- User Information -->
				<div class="user-details">
					<div class="user-header">
						<div>
							<h1 class="username">{{ user.username }}</h1>
							<p class="join-date" *ngIf="user.createdAt">
								Joined {{ user.createdAt | date: 'dd/MM/yyyy' }}
							</p>
						</div>
						<div class="action-buttons">
							<button class="edit-btn" (click)="editProfile()" *ngIf="isOwnProfile">
								Edit profile
							</button>
							<button class="delete-btn" (click)="deleteAccount()" *ngIf="isOwnProfile">
								Delete account
							</button>
						</div>
					</div>

					<!-- Bio -->
					<p class="bio" *ngIf="user.bio">{{ user.bio }}</p>
				</div>
			</div>
		</div>
	</div>

	<!-- Tabs Section -->
	<div class="profile-tabs" *ngIf="!isLoadingUser && user">
		<div class="tabs-header">
			<button class="tab-btn" [class.active]="activeTab === 'posts'" (click)="activeTab = 'posts'">
				<svg viewBox="0 0 24 24" class="tab-icon">
					<path d="M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4" />
					<path d="M2 6h4" />
					<path d="M2 10h4" />
					<path d="M2 14h4" />
					<path d="M2 18h4" />
					<path
						d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z" />
				</svg>
				<span>Posts</span>
			</button>
			<button class="tab-btn" [class.active]="activeTab === 'comments'" (click)="activeTab = 'comments'">
				<svg viewBox="0 0 24 24" class="tab-icon">
					<path
						d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719" />
				</svg>
				<span>Comments</span>
			</button>
			<button class="tab-btn" [class.active]="activeTab === 'likes'" (click)="activeTab = 'likes'"
				*ngIf="isOwnProfile">
				<svg viewBox="0 0 24 24" class="tab-icon">
					<path
						d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z" />
					<path d="M7 10v12" />
				</svg>
				<span>Likes</span>
			</button>
		</div>

		<!-- Content -->
		<div class="tabs-content">
			<!-- Posts Tab -->
			<div class="tab-content" *ngIf="activeTab === 'posts'">
				<app-post-list [filterUsername]="filterUsername" [pageSize]="10"
					[refreshTrigger]="refreshTrigger"></app-post-list>
			</div>

			<!-- Comments Tab -->
			<div class="tab-content" *ngIf="activeTab === 'comments'">
				<div class="empty-state">
					<p class="empty-text">Comments in development</p>
				</div>
			</div>

			<!-- Likes Tab -->
			<div class="tab-content" *ngIf="activeTab === 'likes'">
				<div class="empty-state">
					<p class="empty-text">Likes in development</p>
				</div>
			</div>
		</div>
	</div>
</div>
