<div class="login-wrapper">
	<mat-card class="login-card">

		<h2>Log In</h2>

		<form (ngSubmit)="onSubmit()" #loginForm="ngForm">

			<!-- USERNAME -->
			<mat-form-field appearance="outline" class="full-width">
				<mat-label>Username</mat-label>
				<input matInput name="username" type="text" [(ngModel)]="username" required #usernameInput="ngModel"
					id="username" />
				<mat-error *ngIf="usernameInput.invalid && usernameInput.touched">
					Please enter your username
				</mat-error>
			</mat-form-field>

			<!-- PASSWORD -->
			<mat-form-field appearance="outline" class="full-width">
				<mat-label>Password</mat-label>
				<input matInput name="password" type="password" [(ngModel)]="password" required #passwordInput="ngModel"
					id="password" />
				<mat-error *ngIf="passwordInput.invalid && passwordInput.touched">
					Please enter your password
				</mat-error>
			</mat-form-field>

			<!-- LOGIN BUTTON -->
			<button mat-raised-button type="submit" class="submit-button"
				[disabled]="!username || !password" id="login-button">
				Log In
			</button>

			<!-- ERROR BACKEND -->
			<mat-error *ngIf="errorMessage" class="server-error">
				{{ errorMessage }}
			</mat-error>

		</form>

		<!-- REGISTER LINK -->
		<div class="footer">
			<p>Don't have an account? <a routerLink="/register" class="link">Sign up</a></p>
		</div>
	</mat-card>
</div>
