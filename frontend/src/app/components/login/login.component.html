<div class="login-container">
	<h2>Log In</h2>

	<form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">

		<div class="form-group">
			<label for="username">Username</label>
			<input
				id="username"
				name="username"
				type="text"
				[(ngModel)]="username"
				required
				placeholder="Enter your username"
				#usernameInput="ngModel"
				[class.input-error]="usernameInput.invalid && usernameInput.touched && usernameInput.dirty"
			/>
			<span class="error-message" *ngIf="usernameInput.invalid && usernameInput.touched && usernameInput.dirty">
				Please enter your username
			</span>
		</div>

		<div class="form-group">
			<label for="password">Password</label>
			<input
				id="password"
				name="password"
				type="password"
				[(ngModel)]="password"
				required
				placeholder="Enter your password"
				#passwordInput="ngModel"
				[ngClass]="{
					'input-error': passwordInput.invalid && passwordInput.touched && passwordInput.dirty,
					'input-focus': passwordInput.touched && passwordInput.dirty && passwordInput.value === ''
				}"
			/>
			<span class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched && passwordInput.dirty">
				Please enter your password
			</span>
		</div>

		<button
			type="submit"
			class="btn-login"
			[disabled]="!username || !password"
		>
			Log In
		</button>

		<p *ngIf="errorMessage" class="error-message">
			{{ errorMessage }}
		</p>

	</form>
</div>
